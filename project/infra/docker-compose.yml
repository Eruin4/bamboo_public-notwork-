services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: bamboo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bamboo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bamboo}
    volumes:
      - /mnt/backup/bamboo_db:/var/lib/postgresql/data
    networks:
      - bamboo_internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bamboo} -d ${POSTGRES_DB:-bamboo}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (세션, Rate Limiting, 캐시)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bamboo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bamboo_internal
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bamboo_backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bamboo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bamboo}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-bamboo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bamboo}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-true}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Security
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      # Admin
      ADMIN_PERSONAL_EMAIL: ${ADMIN_PERSONAL_EMAIL:-}
      # Upload
      UPLOAD_DIR: /data/uploads
      THUMB_DIR: /data/thumbs
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      MAX_IMAGE_RESOLUTION: ${MAX_IMAGE_RESOLUTION:-2560}
      THUMB_MAX_SIZE: ${THUMB_MAX_SIZE:-512}
      # Email (개발 모드: console)
      EMAIL_MODE: ${EMAIL_MODE:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # App
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ${UPLOAD_PATH:-/data/uploads}:/data/uploads
      - ${THUMB_PATH:-/data/thumbs}:/data/thumbs
    networks:
      - bamboo_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: bamboo_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - bamboo_internal
    depends_on:
      - backend

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: bamboo_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
      - ${UPLOAD_PATH:-/data/uploads}:/data/uploads:ro
      - ${THUMB_PATH:-/data/thumbs}:/data/thumbs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - bamboo_internal
    depends_on:
      - backend
      - frontend

networks:
  bamboo_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_logs:


