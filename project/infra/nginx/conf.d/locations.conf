# ============================================
# Static Files - Uploads (Images & Documents)
# ============================================
location /uploads/ {
    alias /data/uploads/;
    
    # Security: 실행 불가, 정적 서빙만
    location ~ \.(php|py|sh|pl|cgi)$ {
        deny all;
    }
    
    # Cache control – 1 year (uploads use unique storage keys)
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Prevent directory listing
    autoindex off;
    
    # Allow image and document file types
    location ~ \.(jpg|jpeg|png|gif|webp|svg|pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|7z|txt|hwp|bin)$ {
        try_files $uri =404;

        # Force download for non-image files
        if ($uri ~* \.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|7z|txt|hwp|bin)$) {
            add_header Content-Disposition "attachment";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
}

# ============================================
# Static Files - Thumbnails
# ============================================
location /thumbs/ {
    alias /data/thumbs/;
    
    # Security
    location ~ \.(php|py|sh|pl|cgi)$ {
        deny all;
    }
    
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    autoindex off;
    
    location ~ \.(jpg|jpeg|png|gif|webp)$ {
        try_files $uri =404;
    }
}

# ============================================
# API Routes - Backend
# ============================================
location /api/ {
    # Rate limiting
    limit_req zone=api_limit burst=50 nodelay;
    
    # Proxy settings
    proxy_pass http://backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    # Timeouts
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
}

# ============================================
# Auth Routes - Stricter Rate Limiting
# ============================================
location /api/auth/ {
    limit_req zone=auth_limit burst=10 nodelay;
    
    proxy_pass http://backend/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

# ============================================
# Upload Routes - File Size Limit
# ============================================
location /api/uploads {
    limit_req zone=upload_limit burst=5 nodelay;
    
    # Max upload size (10MB + overhead)
    client_max_body_size 11m;
    
    proxy_pass http://backend/uploads;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    # Longer timeout for uploads
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 60s;
}

# ============================================
# Frontend - Next.js
# ============================================
location / {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Cache Next.js static assets (content-hashed, safe to cache forever)
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Cache other static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 30d;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}

# ============================================
# Certbot - Let's Encrypt
# ============================================
location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
}

# ============================================
# Block sensitive paths
# ============================================
location ~ /\. {
    deny all;
}

location ~ ^/(\.git|\.env|docker-compose|Dockerfile) {
    deny all;
}

